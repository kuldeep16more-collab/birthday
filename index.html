<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Panda ❤️</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background: #ffb6c1;
}

/* Screens */
.screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#intro { display: flex; }

/* Button */
.btn {
  font-size: 6vw;
  padding: 4vw 8vw;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 6px #999;
  transition: all 0.2s;
  opacity: 0;
  margin-top: 20px;
}

.showBtn { opacity: 1; }

.btn:active {
  box-shadow: 0 2px #666;
  transform: translateY(4px);
}

/* Text */
.text {
  font-size: 5.5vw;
  max-width: 90%;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* Cursor */
.cursor {
  border-right: 2px solid red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* ❤️ HEARTS */
.heart {
  position: fixed;
  bottom: -10px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="intro" class="screen">
  <button class="btn" style="opacity:1" onclick="goToLetter()">Press ❤️</button>
</div>

<!-- Screen 2 -->
<div id="letter" class="screen">
  <div id="letterText" class="text"></div>
  <button id="btn2" class="btn" onclick="goToMemories()">Press ❤️</button>
</div>

<!-- Screen 3 -->
<div id="memory" class="screen">
  <div id="memoryText" class="text"></div>
  <button id="btn3" class="btn" onclick="goToFinal()">Press ❤️</button>
</div>

<!-- Screen 4 -->
<div id="final" class="screen">
  <div id="line1" class="text"></div>
  <div id="line2" class="text"></div>
  <button id="btn4" class="btn" onclick="goToEnd()">One Last Thing ❤️</button>
</div>

<!-- Screen 5 (ENDING BACK) -->
<div id="end" class="screen">
  <div id="endText" class="text"></div>
</div>

<!-- Sounds -->
<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<audio id="click">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<script>

// sound
function clickSound(){
  let s=document.getElementById("click");
  s.currentTime=0;
  s.play();
}

// navigation
function switchScreen(hide,show){
  document.getElementById(hide).style.display="none";
  document.getElementById(show).style.display="flex";
}

function goToLetter(){
  clickSound();
  switchScreen("intro","letter");
  document.getElementById("music").play();
  typeLetter();
}

function goToMemories(){
  clickSound();
  switchScreen("letter","memory");
  typeMemories();
}

function goToFinal(){
  clickSound();
  switchScreen("memory","final");
  typeFinal();
}

function goToEnd(){
  clickSound();
  switchScreen("final","end");
  typeEnd();
}

// typing
function typeText(el,text,speed,cursor,cb){
  let i=0;
  el.innerHTML="";
  if(cursor) el.classList.add("cursor");

  function t(){
    if(i<=text.length){
      el.innerHTML=text.substring(0,i);
      i++;
      setTimeout(t,speed);
    } else {
      el.classList.remove("cursor");
      el.style.borderRight="none";
      if(cb) cb();
    }
  }
  t();
}

// 💌 LOVE LETTER
function typeLetter(){
startHearts();
let text="Mujhe pata nahi kaise start karu... par ek baat sach hai ki jab se tu meri life me aayi hai, sab kuch change ho gaya hai. Tu sirf ek ladki nahi hai, tu meri khushi hai, meri smile ka reason hai. Jab tu baat karti hai na, pura din achha ho jata hai. Kabhi kabhi bas tujhe dekh ke hi smile aa jati hai. Mujhe tere saath rehna, baat karna, sab kuch bohot pasand hai. Tu meri best friend bhi hai aur meri sabse pyari feeling bhi. Main bas itna kehna chahta hu ki tu hamesha khush rahe, aur main hamesha tere saath rahu. Happy Birthday ❤️";

typeText(letterText,text,35,false,()=>{btn2.classList.add("showBtn");});
}

// 💭 MEMORY
function typeMemories(){
startHearts();
let text="Har moment jo tere saath spend kiya hai na... wo mere liye treasure hai.\nTere saath rehna, tere sath roz baatein karna sab kuch special hai.\nTu mere life ka sabse important part hai 💖";

typeText(memoryText,text,35,false,()=>{btn3.classList.add("showBtn");});
}

// 🎉 FINAL
function typeFinal(){
startHearts();
typeText(line1,"Happy Birthday 🎂",80,true,()=>{
typeText(line2,"Mele Panda 🫂💖",80,true,()=>{
btn4.classList.add("showBtn");
});
});
}

// 💖 END + HEARTS
function typeEnd(){
let text="I Love You So Much ❤️\nTu meri life ka sabse important part hai.\nMain bas itna chahta hu ki tu hamesha smile karti rahe.\nMain hamesha tere saath rahunga.\nyou are my forever 💖";

typeText(endText,text,60,true);
startHearts();
}

// ❤️ HEARTS FUNCTION
function startHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
}

</script>

</body>
</html>
