<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #ffb6c1;
  font-family: Arial;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: red;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
  <h1>Happy Birthday Deepika 🎂❤️</h1>
  <p>You are my everything 💖</p>
  <button onclick="showMessage()">Click Me ❤️</button>
  <p id="msg"></p>
</div>

<script>
function showMessage() {
  document.getElementById("msg").innerHTML = "I love you forever 💕";
}
</script>

</body>
</html>
