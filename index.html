<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Panda ❤️</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background: #ffb6c1;
}

.screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#intro { display: flex; }

/* Button */
.btn {
  font-size: 6vw;
  padding: 4vw 8vw;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 6px #999;
  transition: all 0.2s;
  opacity: 0;
  margin-top: 20px;
}

.showBtn { opacity: 1; }

.btn:active {
  box-shadow: 0 2px #666;
  transform: translateY(4px);
}

/* Text */
.text {
  font-size: 5.5vw;
  max-width: 90%;
  line-height: 1.6;
  margin-bottom: 20px;
}

/* Cursor */
.cursor {
  border-right: 2px solid red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* 🎆 FIREWORKS */
.firework {
  position: fixed;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  animation: explode 1s ease-out forwards;
}

@keyframes explode {
  0% {
    transform: scale(0);
    opacity: 1;
  }
  100% {
    transform: scale(15);
    opacity: 0;
  }
}
</style>
</head>

<body>

<div id="intro" class="screen">
  <button class="btn" style="opacity:1" onclick="goToLetter()">Press ❤️</button>
</div>

<div id="letter" class="screen">
  <div id="letterText" class="text"></div>
  <button id="btn2" class="btn" onclick="goToMemories()">Press ❤️</button>
</div>

<div id="memory" class="screen">
  <div id="memoryText" class="text"></div>
  <button id="btn3" class="btn" onclick="goToFinal()">Press ❤️</button>
</div>

<!-- 🎉 FINAL SCREEN -->
<div id="final" class="screen">
  <div id="line1" class="text"></div>
  <div id="line2" class="text"></div>
</div>

<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<audio id="click">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<script>

function clickSound(){
  let s=document.getElementById("click");
  s.currentTime=0;
  s.play();
}

function switchScreen(hide,show){
  document.getElementById(hide).style.display="none";
  document.getElementById(show).style.display="flex";
}

function goToLetter(){
  clickSound();
  switchScreen("intro","letter");
  document.getElementById("music").play();
  typeLetter();
}

function goToMemories(){
  clickSound();
  switchScreen("letter","memory");
  typeMemories();
}

function goToFinal(){
  clickSound();
  switchScreen("memory","final");
  typeFinal();
  startFireworks(); // 🎆 start here
}

// typing
function typeText(el,text,speed,cursor,cb){
  let i=0;
  el.innerHTML="";
  if(cursor) el.classList.add("cursor");

  function t(){
    if(i<=text.length){
      el.innerHTML=text.substring(0,i);
      i++;
      setTimeout(t,speed);
    } else {
      el.classList.remove("cursor");
      el.style.borderRight="none";
      if(cb) cb();
    }
  }
  t();
}

function typeLetter(){
let text="Mujhe pata nahi kaise start karu... par ek baat sach hai ki jab se tu meri life me aayi hai, sab kuch change ho gaya hai. Tu sirf ek ladki nahi hai, tu meri khushi hai, meri smile ka reason hai. Jab tu baat karti hai na, pura din achha ho jata hai. Kabhi kabhi bas tujhe dekh ke hi smile aa jati hai. Mujhe tere saath rehna, baat karna, sab kuch bohot pasand hai. Tu meri best friend bhi hai aur meri sabse pyari feeling bhi. Main bas itna kehna chahta hu ki tu hamesha khush rahe, aur main hamesha tere saath rahu. Happy Birthday ❤️";

typeText(letterText,text,35,false,()=>{btn2.classList.add("showBtn");});
}

function typeMemories(){
let text="Har moment jo tere saath spend kiya hai na... wo mere liye treasure hai.\nTere saath hasi, baatein sab kuch special hai.\nTu mere life ka sabse important part hai 💖";

typeText(memoryText,text,35,false,()=>{btn3.classList.add("showBtn");});
}

function typeFinal(){
typeText(line1,"Happy Birthday 🎂",80,true,()=>{
typeText(line2,"Mele Panda 🫂💖",80,true);
});
}

// 🎆 FIREWORKS FUNCTION
function startFireworks(){
  setInterval(()=>{
    let f=document.createElement("div");
    f.className="firework";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    f.style.background=`hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(f);

    setTimeout(()=>f.remove(),1000);
  },300);
}

</script>

</body>
</html>
