<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #ffb6c1;
  font-family: Arial;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: red;
  margin-bottom: 40px;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
}

/* Confetti */
.confetti {
  position: fixed;
  top: -20px;
  width: 6px;
  height: 14px;
  opacity: 0.8;
}

@keyframes fall {
  0% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(var(--x1)) translateY(25vh) rotate(90deg); }
  50% { transform: translateX(var(--x2)) translateY(50vh) rotate(180deg); }
  75% { transform: translateX(var(--x3)) translateY(75vh) rotate(270deg); }
  100% { transform: translateX(var(--x4)) translateY(110vh) rotate(360deg); }
}
</style>

</head>

<body>

<div class="container">
  <h1>Happy Birthday Mele Panda 🎂❤️</h1>
  <button onclick="startAll()">Click Me ❤️</button>
  <p id="msg"></p>
</div>

<!-- 🎶 Music -->
<audio id="music" loop>
  <source src="https://www.soundjay.com/human/sounds/happy-birthday-song-01.mp3" type="audio/mpeg">
</audio>

<script>
function startAll() {
  document.getElementById("msg").innerHTML = "I love you forever 💕";
  
  // 🎶 Play music
  document.getElementById("music").play();
}

const colors = ["red", "blue", "green", "yellow"];

function createConfetti() {
  let c = document.createElement("div");
  c.className = "confetti";

  c.style.left = Math.random() * 100 + "vw";
  c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

  c.style.setProperty('--x1', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x2', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x3', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x4', (Math.random() * 100 - 50) + "px");

  let duration = 5 + Math.random() * 6;
  c.style.animation = `fall ${duration}s linear forwards`;

  document.body.appendChild(c);

  setTimeout(() => {
    c.remove();
  }, duration * 1000);
}

// continuous confetti
setInterval(() => {
  for (let i = 0; i < 5; i++) {
    createConfetti();
  }
}, 300);
</script>

</body>
</html>
