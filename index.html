<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
  font-family: Arial;
}

/* Intro Screen */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background-color: #ffb6c1;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Arrow button */
#startBtn {
  font-size: 8vw; /* responsive */
  padding: 4vw 6vw;
  border: none;
  border-radius: 50%;
  background: white;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

/* Main Screen */
#main {
  display: none;
  height: 100%;
  width: 100%;
  background-color: #ffb6c1;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

/* Typewriter text */
h1 {
  color: red;
  margin-bottom: 30px;
  font-size: 7vw; /* responsive */
  border-right: 2px solid red;
  white-space: nowrap;
  overflow: hidden;
}

/* blinking cursor */
@keyframes blink {
  50% { border-color: transparent; }
}

.typing {
  animation: blink 1s infinite;
}

/* Button */
button {
  padding: 3vw 5vw;
  font-size: 4vw;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
}

/* Confetti */
.confetti {
  position: fixed;
  top: -20px;
  width: 4px;
  height: 10px;
  opacity: 0.8;
}

@keyframes fall {
  0% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(var(--x1)) translateY(25vh) rotate(90deg); }
  50% { transform: translateX(var(--x2)) translateY(50vh) rotate(180deg); }
  75% { transform: translateX(var(--x3)) translateY(75vh) rotate(270deg); }
  100% { transform: translateX(var(--x4)) translateY(110vh) rotate(360deg); }
}
</style>

</head>

<body>

<!-- Intro -->
<div id="intro">
  <button id="startBtn">➜</button>
</div>

<!-- Main -->
<div id="main">
  <div class="container">
    <h1 id="title"></h1>
    <button onclick="showMessage()">Click Me ❤️</button>
    <p id="msg"></p>
  </div>
</div>

<!-- Music -->
<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>
const text = "Happy Birthday Mele Panda 🎂❤️";
let index = 0;

// Start
document.getElementById("startBtn").onclick = function() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "flex";

  document.getElementById("music").play();
  startTyping();
  startConfetti();
};

// Typewriter
function startTyping() {
  let title = document.getElementById("title");
  title.classList.add("typing");

  function type() {
    if (index < text.length) {
      title.innerHTML += text.charAt(index);
      index++;
      setTimeout(type, 80);
    } else {
      title.classList.remove("typing");
    }
  }
  type();
}

// Message
function showMessage() {
  document.getElementById("msg").innerHTML = "I love you forever 💕";
}

// Confetti (optimized for mobile)
const colors = ["red", "blue", "green", "yellow"];

function createConfetti() {
  let c = document.createElement("div");
  c.className = "confetti";

  c.style.left = Math.random() * 100 + "vw";
  c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

  c.style.setProperty('--x1', (Math.random() * 60 - 30) + "px");
  c.style.setProperty('--x2', (Math.random() * 60 - 30) + "px");
  c.style.setProperty('--x3', (Math.random() * 60 - 30) + "px");
  c.style.setProperty('--x4', (Math.random() * 60 - 30) + "px");

  let duration = 4 + Math.random() * 5;
  c.style.animation = `fall ${duration}s linear forwards`;

  document.body.appendChild(c);

  setTimeout(() => c.remove(), duration * 1000);
}

function startConfetti() {
  setInterval(() => {
    for (let i = 0; i < 3; i++) { // 👈 mobile ke liye kam
      createConfetti();
    }
  }, 300);
}
</script>

</body>
</html>
