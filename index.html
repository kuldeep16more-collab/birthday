<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #ffb6c1;
  font-family: Arial;
}

/* Center content */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: red;
  margin-bottom: 40px;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
}

/* 🎊 Confetti */
.confetti {
  position: fixed;
  top: -20px;
  width: 6px;
  height: 14px;
  opacity: 0.8;
}

/* REALISTIC FALL */
@keyframes fall {
  0% {
    transform: translateX(0) translateY(0) rotate(0deg);
  }
  25% {
    transform: translateX(var(--x1)) translateY(25vh) rotate(90deg);
  }
  50% {
    transform: translateX(var(--x2)) translateY(50vh) rotate(180deg);
  }
  75% {
    transform: translateX(var(--x3)) translateY(75vh) rotate(270deg);
  }
  100% {
    transform: translateX(var(--x4)) translateY(110vh) rotate(360deg);
  }
}
</style>

</head>

<body>

<div class="container">
  <h1>Happy Birthday Mele Panda 🎂❤️</h1>
  <button onclick="showMessage()">Click Me ❤️</button>
  <p id="msg"></p>
</div>

<!-- Music -->
<audio autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

<script>
function showMessage() {
  document.getElementById("msg").innerHTML = "I love you forever 💕";
}

// 🎊 Confetti generate (REAL RANDOM)
const colors = ["red", "blue", "green", "yellow"];

for (let i = 0; i < 100; i++) {
  let c = document.createElement("div");
  c.className = "confetti";

  c.style.left = Math.random() * 100 + "vw";
  c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

  // random zig-zag movement
  c.style.setProperty('--x1', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x2', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x3', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x4', (Math.random() * 100 - 50) + "px");

  // 👇 IMPORTANT: slow + different speed
  let duration = 5 + Math.random() * 6;
  c.style.animation = `fall ${duration}s linear infinite`;

  document.body.appendChild(c);
}
</script>

</body>
</html>
