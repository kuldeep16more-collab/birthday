<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Panda ❤️</title>

<style>
/* SAME OLD CSS ABOVE — NO CHANGE */

/* 🎂 cake */
.cakeBox {
  position: fixed;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.cake {
  font-size: 20vw;
  transition: transform 1s;
}

/* 🔪 knife */
.knife {
  position: absolute;
  font-size: 10vw;
  top: -20px;
  left: 50%;
  transform: translateX(-50%);
  animation: cut 1.5s ease forwards;
}

@keyframes cut {
  0% { top: -40px; }
  50% { top: 20px; }
  100% { top: -40px; }
}
</style>
</head>

<body>

<!-- ⚠️ SAME HTML AS YOUR ORIGINAL (no change above) -->

<script>

/* SAME JS ABOVE */

/* 🎂 UPDATED BLOW */
function blow(el){
  if(el.classList.contains("blown")) return;

  el.classList.add("blown");
  el.innerHTML = "";

  let smoke = document.createElement("div");
  smoke.className = "smoke";
  smoke.innerHTML = "💨";
  el.appendChild(smoke);

  if(candlesLeft > 0){
    candlesLeft--;
  }

  if(candlesLeft === 0){
    document.getElementById("tapText").style.display="none";
    showCake();
  }
}

/* 🎂 cake animation */
function showCake(){
  let box = document.createElement("div");
  box.className = "cakeBox";

  let cake = document.createElement("div");
  cake.className = "cake";
  cake.innerHTML = "🎂";

  let knife = document.createElement("div");
  knife.className = "knife";
  knife.innerHTML = "🔪";

  box.appendChild(cake);
  box.appendChild(knife);
  document.body.appendChild(box);

  // after cut → show wish
  setTimeout(()=>{
    box.remove();
    showWish();
    blastConfetti();

    if(navigator.vibrate){
      navigator.vibrate([200,100,200]);
    }

  },1800);
}

/* SAME showWish + confetti functions */

</script>

</body>
</html>
