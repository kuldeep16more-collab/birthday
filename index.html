<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday ❤️</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background-color: #ffb6c1;
}

.screen {
  display: none;
  height: 100%;
  width: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#intro { display: flex; }

.btn {
  font-size: 6vw;
  padding: 4vw 8vw;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 6px #999;
  transition: all 0.2s;
  opacity: 0; /* 👈 hidden initially */
}

/* show animation */
.showBtn {
  opacity: 1;
}

.btn:active {
  box-shadow: 0 2px #666;
  transform: translateY(4px);
}

.text {
  font-size: 5.5vw;
  max-width: 90%;
  word-wrap: break-word;
  margin-bottom: 40px;
}

.cursor {
  border-right: 2px solid red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="intro" class="screen">
  <button class="btn" style="opacity:1" onclick="goToLetter()">Press ❤️</button>
</div>

<!-- Screen 2 -->
<div id="letter" class="screen">
  <div id="letterText" class="text"></div>
  <button id="nextBtn" class="btn" onclick="goToFinal()">Press ❤️</button>
</div>

<!-- Screen 3 -->
<div id="final" class="screen">
  <div id="line1" class="text"></div>
  <div id="line2" class="text"></div>
</div>

<!-- Music -->
<audio id="bgMusic" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<!-- Click -->
<audio id="clickSound">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<script>

function playClick() {
  document.getElementById("clickSound").play();
}

function goToLetter() {
  playClick();
  document.getElementById("intro").style.display = "none";
  document.getElementById("letter").style.display = "flex";

  document.getElementById("bgMusic").play();
  typeLetter();
}

function goToFinal() {
  document.getElementById("letter").style.display = "none";
  document.getElementById("final").style.display = "flex";

  typeFinal();
}

// typing function
function typeText(element, text, speed, callback) {
  let i = 0;
  element.classList.add("cursor");

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      element.classList.remove("cursor");
      element.style.borderRight = "none";

      if (callback) callback();
    }
  }
  typing();
}

// love letter
function typeLetter() {
  const text = "Mujhe pata nahi kaise start karu... par ek baat sach hai ki jab se tu meri life me aayi hai, sab kuch change ho gaya hai. Tu sirf ek ladki nahi hai, tu meri khushi hai, meri smile ka reason hai. Jab tu baat karti hai na, pura din achha ho jata hai. Kabhi kabhi bas tujhe dekh ke hi smile aa jati hai. Mujhe tere saath rehna, baat karna, sab kuch bohot pasand hai. Tu meri best friend bhi hai aur meri sabse pyari feeling bhi. Main bas itna kehna chahta hu ki tu hamesha khush rahe, aur main hamesha tere saath rahu. Happy Birthday ❤️";

  typeText(document.getElementById("letterText"), text, 35, () => {
    // 👉 show button AFTER typing
    document.getElementById("nextBtn").classList.add("showBtn");
  });
}

// final
function typeFinal() {
  typeText(document.getElementById("line1"), "Happy Birthday 🎂", 80, () => {
    typeText(document.getElementById("line2"), "Mele Panda 🫂💖", 80);
  });
}

</script>

</body>
</html>
