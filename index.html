<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Panda ❤️</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background: #ffb6c1;
}

.screen {
  display: none;
  height: 100%;
  width: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;
}

#intro { display: flex; }

/* Button */
.btn {
  font-size: 6vw;
  padding: 4vw 8vw;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 6px #999;
  transition: all 0.2s;
  opacity: 0;
}

.showBtn { opacity: 1; }

.btn:active {
  box-shadow: 0 2px #666;
  transform: translateY(4px);
}

/* Text */
.text {
  display: inline-block;
  font-size: 5.5vw;
  max-width: 90%;
  line-height: 1.5;
  margin-bottom: 30px;
}

/* Cursor */
.cursor {
  border-right: 2px solid red;
  animation: blink 1s infinite;
}
@keyframes blink {
  50% { border-color: transparent; }
}

/* Floating hearts */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}
</style>
</head>

<body>

<!-- Screen 1 -->
<div id="intro" class="screen">
  <button class="btn" style="opacity:1" onclick="goToLetter()">Press ❤️</button>
</div>

<!-- Screen 2 (Love Letter) -->
<div id="letter" class="screen">
  <div id="letterText" class="text"></div>
  <button id="btn2" class="btn" onclick="goToMemories()">Press ❤️</button>
</div>

<!-- Screen 3 (Memories) -->
<div id="memory" class="screen">
  <div id="memoryText" class="text"></div>
  <button id="btn3" class="btn" onclick="goToFinal()">Press ❤️</button>
</div>

<!-- Screen 4 (Final Wish) -->
<div id="final" class="screen">
  <div id="line1" class="text"></div>
  <div id="line2" class="text"></div>
  <button id="btn4" class="btn" onclick="goToEnd()">One Last Thing ❤️</button>
</div>

<!-- Screen 5 (Ending) -->
<div id="end" class="screen">
  <div id="endText" class="text"></div>
</div>

<!-- Sounds -->
<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<audio id="click">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<script>

// sound
function clickSound(){
  let s = document.getElementById("click");
  s.currentTime = 0;
  s.play();
}

// navigation
function goToLetter(){
  clickSound();
  switchScreen("intro","letter");
  document.getElementById("music").play();
  typeLetter();
}

function goToMemories(){
  clickSound();
  switchScreen("letter","memory");
  typeMemories();
}

function goToFinal(){
  clickSound();
  switchScreen("memory","final");
  typeFinal();
}

function goToEnd(){
  clickSound();
  switchScreen("final","end");
  typeEnd();
}

function switchScreen(hide,show){
  document.getElementById(hide).style.display="none";
  document.getElementById(show).style.display="flex";
}

// typing
function typeText(el,text,speed,cursor,cb){
  let i=0;
  el.innerHTML="";
  if(cursor) el.classList.add("cursor");

  function t(){
    if(i<=text.length){
      el.innerHTML=text.substring(0,i);
      i++;
      setTimeout(t,speed);
    } else {
      el.classList.remove("cursor");
      el.style.borderRight="none";
      if(cb) cb();
    }
  }
  t();
}

// screens content
function typeLetter(){
  let text="Mujhe pata nahi kaise bolu... par tu meri life ka sabse beautiful part hai. Jab tu smile karti hai na, sab kuch perfect lagta hai. Tu meri khushi hai, meri aadat hai, meri duniya hai. Main bas itna chahta hu ki tu hamesha khush rahe... aur main hamesha tere saath rahu ❤️";
  typeText(letterText,text,35,false,()=>{
    btn2.classList.add("showBtn");
  });
}

function typeMemories(){
  let text="Har moment jo tere saath spend kiya hai na... wo mere liye memory nahi, treasure hai. Tere saath hasi, baatein, chhoti chhoti fights... sab kuch mujhe aur bhi zyada tere paas le aata hai 💖";
  typeText(memoryText,text,35,false,()=>{
    btn3.classList.add("showBtn");
  });
}

function typeFinal(){
  typeText(line1,"Happy Birthday 🎂",80,true,()=>{
    typeText(line2,"Mele Panda 🫂💖",80,true,()=>{
      btn4.classList.add("showBtn");
    });
  });
}

function typeEnd(){
  let text="I Love You So Much ❤️\nYou Are My Forever 💖";
  typeText(endText,text,60,true);
  startHearts();
}

// hearts
function startHearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*25)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);
}

</script>

</body>
</html>
