<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday ❤️</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background-color: #ffb6c1;
}

/* Screens */
.screen {
  display: none;
  height: 100%;
  width: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#intro { display: flex; }

/* Button (Arrow + Next) */
.btn {
  font-size: 8vw;
  padding: 4vw 6vw;
  border-radius: 50%;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 6px #999;
  transition: all 0.1s;
}

/* Press effect */
.btn:active {
  box-shadow: 0 2px #666;
  transform: translateY(4px);
}

/* Text */
.text {
  font-size: 6vw;
  max-width: 90%;
  word-wrap: break-word;
  margin-bottom: 20px;
}

/* Cursor */
.cursor {
  border-right: 2px solid red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}
</style>
</head>

<body>

<!-- 🔹 Screen 1 -->
<div id="intro" class="screen">
  <button class="btn" onclick="goToLetter()">➜</button>
</div>

<!-- 🔹 Screen 2 (Love Letter) -->
<div id="letter" class="screen">
  <div id="letterText" class="text"></div>
  <button class="btn" onclick="goToFinal()">➜</button>
</div>

<!-- 🔹 Screen 3 (Final) -->
<div id="final" class="screen">
  <div id="line1" class="text"></div>
  <div id="line2" class="text"></div>
</div>

<!-- 🎶 Sounds -->
<audio id="bgMusic" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<script>

// ---------- NAVIGATION ----------
function playClick() {
  document.getElementById("clickSound").play();
}

function goToLetter() {
  playClick();
  document.getElementById("intro").style.display = "none";
  document.getElementById("letter").style.display = "flex";

  document.getElementById("bgMusic").play();
  typeLetter();
}

function goToFinal() {
  playClick();
  document.getElementById("letter").style.display = "none";
  document.getElementById("final").style.display = "flex";

  typeFinal();
}

// ---------- TYPEWRITER ----------
function typeText(element, text, speed, callback) {
  let i = 0;
  element.classList.add("cursor");

  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      element.classList.remove("cursor");
      if (callback) callback();
    }
  }
  typing();
}

// ---------- LOVE LETTER ----------
function typeLetter() {
  const text = "Mujhe pata nahi kaise bolu... par tu meri life ka sabse special part hai. Jab tu hasta hai na, sab kuch perfect lagta hai. Tu sirf meri girlfriend nahi, meri best friend, meri khushi aur meri duniya hai. Happy Birthday ❤️";

  typeText(document.getElementById("letterText"), text, 40);
}

// ---------- FINAL SCREEN ----------
function typeFinal() {
  typeText(document.getElementById("line1"), "Happy Birthday 🎂", 80, () => {
    typeText(document.getElementById("line2"), "Mele Panda 🫂💖", 80);
  });
}

</script>

</body>
</html>
