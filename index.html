<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #ffb6c1;
  font-family: Arial;
}

/* Center content */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: red;
  margin-bottom: 40px;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
  margin-top: 10px;
}

/* 🎊 Confetti */
.confetti {
  position: fixed;
  top: -20px;
  width: 6px;
  height: 14px;
  opacity: 0.8;
}

/* Random animation */
@keyframes fall {
  0% {
    transform: translate(0, 0) rotate(0deg);
  }
  25% {
    transform: translate(var(--x1), 25vh) rotate(90deg);
  }
  50% {
    transform: translate(var(--x2), 50vh) rotate(180deg);
  }
  75% {
    transform: translate(var(--x3), 75vh) rotate(270deg);
  }
  100% {
    transform: translate(var(--x4), 110vh) rotate(360deg);
  }
}
</style>

</head>

<body>

<div class="container">
  <h1>Happy Birthday Mele Panda 🎂❤️</h1>
  <button onclick="showMessage()">Click Me ❤️</button>
  <p id="msg"></p>
</div>

<!-- Music -->
<audio autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

<script>
// Message
function showMessage() {
  document.getElementById("msg").innerHTML = "I love you forever 💕";
}

// 🎊 Confetti generate with random direction
const colors = ["red", "blue", "green", "yellow"];

for (let i = 0; i < 80; i++) {
  let c = document.createElement("div");
  c.className = "confetti";

  c.style.left = Math.random() * 100 + "vw";
  c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

  // random movement values
  c.style.setProperty('--x1', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x2', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x3', (Math.random() * 100 - 50) + "px");
  c.style.setProperty('--x4', (Math.random() * 100 - 50) + "px");

  c.style.animation = `fall ${3 + Math.random() * 5}s linear infinite`;

  document.body.appendChild(c);
}
</script>

</body>
</html>
