<!DOCTYPE html>
<html>
<head>
<title>Happy Birthday ❤️</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #ffb6c1;
  font-family: Arial;
}

/* Center content */
.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: red;
  margin-bottom: 40px;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: white;
  cursor: pointer;
}

/* 🎊 Confetti */
.confetti {
  position: fixed;
  top: -20px;
  width: 6px;
  height: 14px;
  opacity: 0.8;
  animation: fall linear infinite;
}

/* RANDOM FALL (clear zig-zag) */
@keyframes fall {
  0% {
    transform: translateX(0px) translateY(0);
  }
  25% {
    transform: translateX(40px) translateY(25vh);
  }
  50% {
    transform: translateX(-40px) translateY(50vh);
  }
  75% {
    transform: translateX(30px) translateY(75vh);
  }
  100% {
    transform: translateX(-30px) translateY(110vh);
  }
}
</style>

</head>

<body>

<div class="container">
  <h1>Happy Birthday Mele Panda 🎂❤️</h1>
  <button onclick="showMessage()">Click Me ❤️</button>
  <p id="msg"></p>
</div>

<!-- Music -->
<audio autoplay loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

<script>
function showMessage() {
  document.getElementById("msg").innerHTML = "I love you forever 💕";
}

// 🎊 Confetti generate
const colors = ["red", "blue", "green", "yellow"];

for (let i = 0; i < 80; i++) {
  let c = document.createElement("div");
  c.className = "confetti";

  c.style.left = Math.random() * 100 + "vw";
  c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

  c.style.animationDuration = (3 + Math.random() * 4) + "s";

  document.body.appendChild(c);
}
</script>

</body>
</html>
