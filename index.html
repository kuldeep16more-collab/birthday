<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Panda ❤️</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background: #ffb6c1;
}

.screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#intro { display: flex; }

.btn {
  font-size: 6vw;
  padding: 4vw 8vw;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 6px #999;
  transition: all 0.2s;
  opacity: 0;
  margin-top: 20px;
}

.showBtn { opacity: 1; }

.btn:active {
  box-shadow: 0 2px #666;
  transform: translateY(4px);
}

.text {
  font-size: 5.5vw;
  max-width: 90%;
  line-height: 1.6;
  margin-bottom: 20px;
}

.cursor {
  border-right: 2px solid red;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* Hearts */
.heart {
  position: fixed;
  bottom: -10px;
  animation: floatUp 6s linear infinite;
}
@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}

/* 🎂 Cake */
.cake {
  font-size: 20vw;
  position: relative;
}

.candle {
  position: absolute;
  top: -20px;
  font-size: 5vw;
  cursor: pointer;
}

.flame {
  color: orange;
}

/* Sprinkles */
.sprinkle {
  position: fixed;
  width: 6px;
  height: 12px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); }
  100% { transform: translateY(100vh) rotate(360deg); }
}
</style>
</head>

<body>

<div id="intro" class="screen">
  <button class="btn" style="opacity:1" onclick="goToLetter()">Press ❤️</button>
</div>

<div id="letter" class="screen">
  <div id="letterText" class="text"></div>
  <button id="btn2" class="btn" onclick="goToMemories()">Press ❤️</button>
</div>

<div id="memory" class="screen">
  <div id="memoryText" class="text"></div>
  <button id="btn3" class="btn" onclick="goToFinal()">Press ❤️</button>
</div>

<div id="final" class="screen">
  <div id="line1" class="text"></div>
  <div id="line2" class="text"></div>
  <button id="btn4" class="btn" onclick="goToEnd()">One Last Thing ❤️</button>
</div>

<!-- END -->
<div id="end" class="screen">
  <div id="endText" class="text"></div>
  <button id="btn5" class="btn" onclick="goToMagic()">Jaaduu ✨</button>
</div>

<!-- 🎂 JAADUU SCREEN -->
<div id="magic" class="screen">
  <div class="cake">🎂
    <div class="candle" style="left:30%" onclick="blow(this)">🕯️</div>
    <div class="candle" style="left:50%" onclick="blow(this)">🕯️</div>
    <div class="candle" style="left:70%" onclick="blow(this)">🕯️</div>
  </div>
  <div class="text">tap on candles to blow</div>
</div>

<audio id="music" loop>
  <source src="birthday.mp3">
</audio>

<audio id="click">
  <source src="click.mp3">
</audio>

<script>

function clickSound(){
  let s=document.getElementById("click");
  s.currentTime=0;
  s.play();
}

function switchScreen(hide,show){
  document.getElementById(hide).style.display="none";
  document.getElementById(show).style.display="flex";
}

function goToLetter(){
  clickSound();
  switchScreen("intro","letter");
  music.play();
  typeLetter();
}

function goToMemories(){
  clickSound();
  switchScreen("letter","memory");
  typeMemories();
}

function goToFinal(){
  clickSound();
  switchScreen("memory","final");
  typeFinal();
}

function goToEnd(){
  clickSound();
  switchScreen("final","end");
  typeEnd();
}

function goToMagic(){
  clickSound();
  switchScreen("end","magic");
  startSprinkles();
}

function typeText(el,text,speed,cursor,cb){
  let i=0;
  el.innerHTML="";
  if(cursor) el.classList.add("cursor");

  function t(){
    if(i<=text.length){
      el.innerHTML=text.substring(0,i);
      i++;
      setTimeout(t,speed);
    } else {
      el.classList.remove("cursor");
      el.style.borderRight="none";
      if(cb) cb();
    }
  }
  t();
}

function typeLetter(){
typeText(letterText,"Tu meri duniya hai ❤️",35,false,()=>btn2.classList.add("showBtn"));
}

function typeMemories(){
typeText(memoryText,"Teri yaadein sabse special hai 💖",35,false,()=>btn3.classList.add("showBtn"));
}

function typeFinal(){
typeText(line1,"Happy Birthday 🎂",80,true,()=>{
typeText(line2,"Mele Panda 🫂💖",80,true,()=>btn4.classList.add("showBtn"));
});
}

function typeEnd(){
typeText(endText,"I Love You Forever ❤️",60,true,()=>btn5.classList.add("showBtn"));
startHearts();
}

/* ❤️ hearts */
function startHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
},300);
}

/* 🎂 blow candles */
function blow(el){
  el.innerHTML=""; // remove candle
}

/* sprinkles */
function startSprinkles(){
setInterval(()=>{
let s=document.createElement("div");
s.className="sprinkle";
s.style.left=Math.random()*100+"vw";
s.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(s);
setTimeout(()=>s.remove(),5000);
},200);
}

</script>

</body>
</html>
