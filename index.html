<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Panda ❤️</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: Arial;
  background: #ffb6c1;
}

.screen {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
}

#intro { display: flex; }

.btn {
  font-size: 6vw;
  padding: 4vw 8vw;
  border-radius: 20px;
  border: none;
  background: white;
  cursor: pointer;
  box-shadow: 0 6px #999;
  transition: all 0.2s;
  opacity: 0;
  margin-top: 20px;
}

.showBtn { opacity: 1; }

.btn:active {
  box-shadow: 0 2px #666;
  transform: translateY(4px);
}

.text {
  font-size: 5.5vw;
  max-width: 90%;
  line-height: 1.6;
  margin-bottom: 20px;
}

.heart {
  position: fixed;
  bottom: -10px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity:1; }
  100% { transform: translateY(-100vh); opacity:0; }
}

.candle {
  font-size: 12vw;
  cursor: pointer;
}

.sprinkle {
  position: fixed;
  width: 6px;
  height: 12px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); }
  100% { transform: translateY(100vh) rotate(360deg); }
}

.smoke {
  position: absolute;
  font-size: 5vw;
  animation: smokeUp 1.5s ease-out forwards;
}

@keyframes smokeUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-60px); opacity: 0; }
}

.wish {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 7vw;
  color: white;
  animation: pop 1s ease, glow 1.5s infinite alternate;
  white-space: nowrap;
}

@keyframes pop {
  0% { transform: translate(-50%, -50%) scale(0); }
  100% { transform: translate(-50%, -50%) scale(1); }
}

@keyframes glow {
  0% { text-shadow: 0 0 5px white, 0 0 10px pink; }
  100% { text-shadow: 0 0 15px white, 0 0 25px hotpink; }
}
</style>
</head>

<body>

<div id="intro" class="screen">
  <button class="btn" style="opacity:1" onclick="goToLetter()">Press ❤️</button>
</div>

<div id="letter" class="screen">
  <div id="letterText" class="text"></div>
  <button id="btn2" class="btn" onclick="goToMemories()">Press ❤️</button>
</div>

<div id="memory" class="screen">
  <div id="memoryText" class="text"></div>
  <button id="btn3" class="btn" onclick="goToFinal()">Press ❤️</button>
</div>

<div id="final" class="screen">
  <div id="line1" class="text"></div>
  <div id="line2" class="text"></div>
  <button id="btn4" class="btn" onclick="goToEnd()">One Last Thing ❤️</button>
</div>

<div id="end" class="screen">
  <div id="endText" class="text"></div>
  <button id="btn5" class="btn" onclick="goToMagic()">Jaaduu ✨</button>
</div>

<div id="magic" class="screen">
  <div>
    <div class="candle" onclick="blow(this)">🕯️</div>
  </div>

  <div style="display:flex; gap:40px;">
    <div class="candle" onclick="blow(this)">🕯️</div>
    <div class="candle" onclick="blow(this)">🕯️</div>
  </div>

  <div id="tapText" class="text" style="margin-top: 40px;">tap on candles to blow</div>
</div>

<audio id="music" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<audio id="click">
  <source src="click.mp3">
</audio>

<script>

let heartInterval;
let candlesLeft = 3;

function clickSound(){
  let s=document.getElementById("click");
  s.currentTime=0;
  s.play();
}

function switchScreen(hide,show){
  document.getElementById(hide).style.display="none";
  document.getElementById(show).style.display="flex";
}

function goToLetter(){
  clickSound();
  switchScreen("intro","letter");
  document.getElementById("music").play();
  typeLetter();
}

function goToMemories(){
  clickSound();
  switchScreen("letter","memory");
  typeMemories();
}

function goToFinal(){
  clickSound();
  switchScreen("memory","final");
  typeFinal();
}

function goToEnd(){
  clickSound();
  switchScreen("final","end");
  typeEnd();
}

function goToMagic(){
  clickSound();
  switchScreen("end","magic");
  stopHearts();
  startSprinkles();
}

/* typing */
function typeText(el,text,speed,cursor,cb){
  let i=0;
  el.innerHTML="";

  function t(){
    if(i<=text.length){
      el.innerHTML=text.substring(0,i);
      i++;
      setTimeout(t,speed);
    } else {
      if(cb) cb();
    }
  }
  t();
}

function typeLetter(){
startHearts();
let text="Mujhe pata nahi kaise start karu... par ek baat sach hai ki jab se tu meri life me aayi hai, sab kuch change ho gaya hai. Tu sirf ek ladki nahi hai, tu meri khushi hai, meri smile ka reason hai. Jab tu baat karti hai na, pura din achha ho jata hai. Kabhi kabhi bas tujhe dekh ke hi smile aa jati hai. Mujhe tere saath rehna, baat karna, sab kuch bohot pasand hai. Tu meri best friend bhi hai aur meri sabse pyari feeling bhi. Main bas itna kehna chahta hu ki tu hamesha khush rahe, aur main hamesha tere saath rahu. Happy Birthday ❤️";

typeText(letterText,text,35,false,()=>{btn2.classList.add("showBtn");});
}

function typeMemories(){
startHearts();

let text=" Har moment jo tere saath spend kiya hai na... wo mere liye treasure hai.\nTere saath rehna, tere sath roz baatein karna sab kuch special hai.\nTu mere life me.\nsabse important hai 💖 ";

typeText(memoryText,text,35,false,()=>{btn3.classList.add("showBtn");});
}

function typeFinal(){
startHearts();
typeText(line1,"Happy Birthday 🎂",80,false,()=>{
typeText(line2,"Mele Panda 🫂💖",80,false,()=>{
btn4.classList.add("showBtn");
});
});
}

function typeEnd(){
let text="I Love You So Much ❤️\nMain bas itna chahta hu ki tu hamesha smile karti rahe.\nor hum hamesha sath rahe.\ni will be your forever 💖";

typeText(endText,text,60,false,()=>{btn5.classList.add("showBtn");});
startHearts();
}

/* hearts */
function startHearts(){
  if(heartInterval) return;
  heartInterval = setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(15+Math.random()*25)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
  },300);
}

function stopHearts(){
  clearInterval(heartInterval);
  heartInterval = null;
}

/* ✅ FIXED BLOW FUNCTION */
function blow(el){
  // already blown? ignore
  if(el.classList.contains("blown")) return;

  el.classList.add("blown");
  el.innerHTML = "";

  let smoke = document.createElement("div");
  smoke.className = "smoke";
  smoke.innerHTML = "💨";
  el.appendChild(smoke);

  if(candlesLeft > 0){
    candlesLeft--;
  }

  if(candlesLeft === 0){
    document.getElementById("tapText").style.display="none";
    showWish();
  }
}

function showWish(){
  let w = document.createElement("div");
  w.className = "wish";
  w.innerHTML = "I Love You My Girl ✨";
  document.body.appendChild(w);
}

function startSprinkles(){
setInterval(()=>{
let s=document.createElement("div");
s.className="sprinkle";
s.style.left=Math.random()*100+"vw";
s.style.background=`hsl(${Math.random()*360},100%,50%)`;
document.body.appendChild(s);
setTimeout(()=>s.remove(),5000);
},200);
}

</script>

</body>
</html>
